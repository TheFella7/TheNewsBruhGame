:root{--bg-paper:#f9f7f1;--bg-paper-dark:#e6e4dc;--ink:#0a0a0a;--ink-light:#454545;--red-accent:#cc0000;--green-accent:#006400;--blue-accent:#0066cc;--font-head:'Playfair Display',serif;--font-mono:'Courier Prime',monospace;--font-old-english:'UnifrakturMaguntia',cursive}

#auth-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;justify-content:center;align-items:center;z-index:10000;padding:20px}
#auth-modal.hidden{display:none}

.auth-modal-content::before{content:'';position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:2px solid var(--red-accent);pointer-events:none}
.auth-tabs{display:flex;margin-bottom:20px;border-bottom:2px solid var(--ink)}
.auth-tab{flex:1;padding:10px;font-family:var(--font-head);font-size:1.2rem;font-weight:bold;cursor:pointer;background:var(--bg-paper-dark);border:2px solid var(--ink);border-bottom:none;transition:all 0.2s}
.auth-tab.active{background:var(--bg-paper);border-bottom:2px solid var(--bg-paper);transform:translateY(2px)}
.auth-tab:first-child{border-right:none}
.auth-form{display:none;margin-top:20px}
.auth-form.active{display:block}
.auth-input{width:100%;padding:15px;margin-bottom:15px;font-family:var(--font-mono);font-size:1rem;border:3px solid var(--ink);background:white;outline:none;transition:all 0.3s}
.auth-input:focus{border-color:var(--red-accent);box-shadow:0 0 20px rgba(204,0,0,0.3)}
/* Password container for show/hide */
.password-container{position:relative;width:100%;margin-bottom:15px}
.password-container .auth-input{padding-right:50px;margin-bottom:0}
.password-toggle{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.4rem;user-select:none;color:var(--ink-light);transition:color 0.2s}
.password-toggle:hover{color:var(--red-accent)}
.auth-btn{background:var(--red-accent);color:white;border:none;padding:15px;font-family:var(--font-head);font-size:1.2rem;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:2px;width:100%;transition:all 0.3s;position:relative;overflow:hidden;margin-top:10px}
.auth-btn:hover{background:#b30000;transform:translateY(-3px);box-shadow:0 10px 20px rgba(0,0,0,0.3)}
.auth-btn:active{transform:translateY(1px);box-shadow:0 5px 10px rgba(0,0,0,0.2)}
.auth-error{color:var(--red-accent);font-family:var(--font-mono);font-size:0.9rem;margin-top:10px;min-height:20px}
.name-rules{font-family:var(--font-mono);font-size:0.8rem;color:var(--ink-light);margin-top:15px;text-align:left;padding:15px;background:var(--bg-paper-dark);border:1px solid var(--ink)}
.name-rules ul{list-style:none;padding-left:10px}
.name-rules li{margin-bottom:5px;position:relative;padding-left:20px}
.name-rules li::before{content:'•';position:absolute;left:0;color:var(--red-accent)}

// ---------- NEW: TOGGLE PASSWORD VISIBILITY ----------
function togglePasswordVisibility(inputId, toggleElement) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    toggleElement.textContent = '👁️‍🗨️'; // closed eye emoji (or use '🙈')
  } else {
    input.type = 'password';
    toggleElement.textContent = '👁️';
  }
}

// ---------- AUTH FUNCTIONS ----------
function switchAuthTab(tab) {
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('register-form').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').classList.toggle('active', tab === 'login');
  // Clear errors
  document.getElementById('register-error').textContent = '';
  document.getElementById('login-error').textContent = '';
}

async function register() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const displayName = document.getElementById('reg-name').value.trim();

  if (!email || !password || !displayName) {
    document.getElementById('register-error').textContent = 'All fields are required.';
    return;
  }
  if (password.length < 6) {
    document.getElementById('register-error').textContent = 'Password must be at least 6 characters.';
    return;
  }
  if (displayName.length > 20) {
    document.getElementById('register-error').textContent = 'Display name max 20 characters.';
    return;
  }

  const btn = document.querySelector('#register-form .auth-btn');
  btn.disabled = true;
  btn.textContent = 'Registering...';

  try {
    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
    });
    if (error) throw error;
    if (!data.user) throw new Error('No user returned');

    gameState.userId = data.user.id;
    gameState.playerName = displayName;

    const { data: saveData } = await supabaseClient
      .from('game_saves')
      .select('game_state')
      .eq('user_id', gameState.userId)
      .maybeSingle();

    if (saveData && saveData.game_state) {
      Object.assign(gameState, saveData.game_state);
      gameState.userId = data.user.id;
      gameState.playerName = displayName;
    }

    await saveGame();

    document.getElementById('auth-modal').classList.add('hidden');
    document.getElementById('newspaper').style.display = 'flex';
    updatePlayerNameDisplay();
    init();

  } catch (err) {
    console.error('Registration error:', err);
    document.getElementById('register-error').textContent = err.message || 'Registration failed.';
    btn.disabled = false;
    btn.textContent = 'REGISTER & START';
  }
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    document.getElementById('login-error').textContent = 'Email and password required.';
    return;
  }

  const btn = document.querySelector('#login-form .auth-btn');
  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email,
      password,
    });
    if (error) throw error;
    if (!data.user) throw new Error('No user returned');

    gameState.userId = data.user.id;

    const { data: saveData, error: fetchError } = await supabaseClient
      .from('game_saves')
      .select('game_state')
      .eq('user_id', gameState.userId)
      .maybeSingle();

    if (fetchError) throw fetchError;

    if (saveData && saveData.game_state) {
      Object.assign(gameState, saveData.game_state);
      gameState.userId = data.user.id;
    } else {
      gameState.playerName = 'Player';
      const name = prompt('Enter your display name (max 20 chars):');
      if (name && name.length <= 20) gameState.playerName = name;
      else gameState.playerName = 'Player';
    }

    document.getElementById('auth-modal').classList.add('hidden');
    document.getElementById('newspaper').style.display = 'flex';
    updatePlayerNameDisplay();
    init();

  } catch (err) {
    console.error('Login error:', err);
    document.getElementById('login-error').textContent = err.message || 'Login failed.';
    btn.disabled = false;
    btn.textContent = 'LOGIN';
  }
}

function updatePlayerNameDisplay() {
  document.getElementById('display-player-name').textContent = gameState.playerName || 'Anonymous';
}
